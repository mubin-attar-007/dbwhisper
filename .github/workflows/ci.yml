name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync deps (base + dev; lean, no torch)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check app db tests run.py

      - name: Ruff format check
        run: uv run ruff format --check app db tests run.py

      - name: Tests (with coverage gate)
        run: uv run pytest --cov=app --cov=db --cov-report=term-missing --cov-fail-under=35

      - name: Dependency vulnerability audit (informational; Dependabot drives the fixes)
        run: uv run pip-audit
        continue-on-error: true

      - name: Type check (informational — type-debt burn-down in progress)
        run: uv run mypy app db || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: npm audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # License-free gitleaks BINARY (matches tradepulse/crownwager). The v2 action crashes when
      # scanning pull requests (ScanPullRequest), turning every PR red; the binary works on push + PR.
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Secret scan (full history)
        run: gitleaks detect --source . --redact --no-banner -v
