name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync deps (base + dev; lean, no torch)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check app db tests run.py

      - name: Ruff format check
        run: uv run ruff format --check app db tests run.py

      - name: Tests
        run: uv run pytest

      - name: Type check (informational — type-debt burn-down in progress)
        run: uv run mypy app db || true

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
