version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      web:
        patterns: ["*"]
    ignore:
      # Tailwind v4 is a breaking change (PostCSS plugin moved to @tailwindcss/postcss);
      # migrate deliberately rather than letting a grouped bump pull it in and break the build.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
