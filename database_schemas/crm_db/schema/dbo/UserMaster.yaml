table_name: UserMaster
schema: dbo
object_type: table
description: The UserMaster table serves as the foundational user management system
  in EndeavorCRM, centralizing all account information required for authentication,
  role-based access control, and user activity tracking. It enables secure login processes,
  including two-factor authentication, while maintaining personal details, role assignments,
  and audit logs for compliance. This table directly supports workforce management
  by linking user credentials to operational permissions and agent profiles.
