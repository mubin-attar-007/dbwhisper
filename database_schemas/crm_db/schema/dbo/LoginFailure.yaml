table_name: LoginFailure
schema: dbo
object_type: table
description: This table logs every unsuccessful login attempt to the system, providing
  crucial data for security monitoring and auditing. Each record captures the username,
  timestamp, and IP address of a failed login, which helps in identifying potential
  security threats like brute-force attacks or other unauthorized access patterns.
  Analyzing this data allows administrators to secure user accounts and maintain system
  integrity.
